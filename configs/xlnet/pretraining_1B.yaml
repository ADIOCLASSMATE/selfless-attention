experiment:
    project: "xlnet-1B-50BT"
    name: "xlnet"
    wandb_project: "selfless-attention"
    output_dir: "output"
    save_every: 100
    eval_every: 100
    generate_every: 10000
    log_every: 10
    log_grad_norm_every: 100
    checkpoints_total_limit: 200
    save_hfmodel_every: 10000
    val_every: 100
    resume_from_checkpoint: none

model:
    model_path: "public/models/Qwen/Qwen3-1B-Custom"
    attention_task: "random"
    loss_task: "likelihood"
    mask_id: -1 # we will replace this id in the training script

dataset:
    class_name: "ArrowDataset"
    params:
        data_path: "public/.cache/huggingface/datasets/fwb-arrow-eos"
        data_class: "parquet"
        shuffle_buffer_size: 50000
        num_workers: 8
        pin_memory: true
        persistent_workers: true

    preprocessing:
        max_seq_length: 2048

optimizer:
    name: adamw
    params:
        learning_rate: 2.0e-4
        scale_lr: false
        beta1: 0.8
        beta2: 0.95
        weight_decay: 0.1
        epsilon: 1e-8

lr_scheduler:
    scheduler: "cosine"
    params:
        learning_rate: ${optimizer.params.learning_rate}
        warmup_steps: 400
        decay_steps: 8000
        min_lr_scale: 0.01

training:
    batch_size: 16
    total_batch_size: 512
    mixed_precision: "bf16"
    enable_tf32: false
    seed: 42
    dataloader_workers: 8
    max_train_steps: 50000
    max_grad_norm: 1.0
    ar_ratio: -1.0
    mc_samples: 16
    use_gradient_checkpointing: false
    step_scheduler_with_optimizer: false
    from_scratch: true
